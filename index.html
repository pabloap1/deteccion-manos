<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IA Detección de Manos - Pro</title>
  <!-- Importar MediaPipe y librerías de dibujo -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #121212;
      color: white;
      font-family: sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    h1 { font-size: 1.2rem; margin: 10px 0; }
    .container {
      position: relative;
      width: 95%;
      max-width: 640px;
      aspect-ratio: 4/3;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,0,0.2);
    }
    #input_video {
      display: none;
    }
    #output_canvas {
      width: 100%;
      height: 100%;
      background-color: #000;
    }
    #status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #00ff00;
    }
    .controls {
      margin-top: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      background: #00ff00;
      border: none;
      border-radius: 5px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Detección de Manos IA (Móvil)</h1>
  
  <div class="container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <div id="status">Iniciando cámara e IA...</div>

  <div class="controls">
    <button onclick="location.reload()">Reiniciar</button>
  </div>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusElement = document.getElementById('status');

    function onResults(results) {
      statusElement.innerText = results.multiHandLandmarks.length > 0 
        ? `Manos detectadas: ${results.multiHandLandmarks.length}` 
        : "Buscando manos...";

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Dibujar la imagen de la cámara
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
          drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
                         {color: '#00FF00', lineWidth: 5});
          drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
        }
      }
      canvasCtx.restore();
    }

    const hands = new Hands({
      locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await hands.send({image: videoElement});
      },
      width: 640,
      height: 480
    });

    // Ajustar resolución del canvas al iniciar
    videoElement.onloadedmetadata = () => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
    };

    camera.start()
      .then(() => {
        statusElement.innerText = "Cámara lista. Muestra tus manos.";
      })
      .catch(err => {
        statusElement.innerText = "Error al abrir la cámara: " + err;
        console.error(err);
      });
  </script>
</body>
</html>
